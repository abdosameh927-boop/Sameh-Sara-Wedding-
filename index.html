طب<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sameh & Sara Wedding</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Georgia,serif;
background:#fdfaf7;
color:#222;
overflow-x:hidden;
}

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
}

.hero h1{
font-size:48px;
margin-bottom:10px;
}

.hero p{
font-size:22px;
letter-spacing:2px;
margin-bottom:35px;
}

button{
padding:15px 35px;
font-size:18px;
border:none;
border-radius:40px;
background:#b68b52;
color:white;
cursor:pointer;
}

button:hover{
background:#9b7342;
}

</style>

</head>

<body>

<section class="hero">

<h1>Sameh & Sara</h1>

<p>Together Forever</p>

<button>Open Invitation</button>

</section>
<div id="invitation" style="display:none; text-align:center; padding:40px;">
  <h2>دعوة زفاف</h2>
  <h1>Sameh & Sara</h1>
  <p>نتشرف بدعوتكم لحضور حفل زفافنا</p>
</div>

<script>
document.querySelector("button").onclick = function(){
  document.querySelector(".hero").style.display = "none";
  document.getElementById("invitation").style.display = "block";
}
</script>
</body>
</html>
