<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sameh & Sara Wedding</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Georgia,"Times New Roman",serif;background:#fffaf3;color:#1b1b1b;overflow-x:hidden}
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:25px;background:radial-gradient(circle at top,rgba(182,139,82,.22),transparent 40%),linear-gradient(180deg,#fffaf3,#f5ecdf)}
.hero-content{animation:fadeUp 1.1s ease both}
.bismillah{font-size:24px;color:#6f4d25;margin-bottom:28px}
.ring{font-size:55px;margin-bottom:18px;animation:float 3s ease-in-out infinite}
.hero h1{font-size:56px;line-height:1;margin-bottom:18px;color:#222}
.hero p{font-size:22px;letter-spacing:4px;color:#5b4a39;margin-bottom:35px}
.open-btn{border:none;padding:17px 38px;border-radius:999px;background:linear-gradient(135deg,#b68b52,#8b6334);color:white;font-size:18px;box-shadow:0 15px 40px rgba(139,99,52,.28)}
.invitation{display:none;min-height:100vh;padding:35px 18px;background:linear-gradient(145deg,#090909,#17110a,#050505);text-align:center;color:white}
.invitation.show{display:block}
.card{width:min(92vw,430px);margin:25px auto;background:linear-gradient(180deg,#fffaf1,#ead7b6);color:#161616;border-radius:28px;padding:34px 22px;box-shadow:0 25px 80px rgba(0,0,0,.55)}
.card h2{font-size:36px;margin-bottom:8px;color:#6f4d25}
.card h1{font-size:42px;margin-bottom:18px;direction:ltr}
.invite{font-size:22px;line-height:1.8;margin-bottom:22px}
.info{font-size:20px;line-height:2;text-align:center;background:rgba(255,255,255,.45);border:1px solid rgba(139,99,52,.25);border-radius:18px;padding:16px;margin-top:18px}
.map-btn{display:inline-block;margin-top:20px;padding:13px 25px;border-radius:999px;background:#111;color:#f4d58b;text-decoration:none;font-size:17px}
.note{margin-top:22px;font-size:18px;line-height:1.7;color:rgba(255,255,255,.86)}
.back-btn{margin-top:18px;border:1px solid rgba(255,255,255,.35);background:transparent;color:white;padding:12px 22px;border-radius:999px}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
</style>
</head>
<body>
<section class="hero" id="hero">
  <div class="hero-content">
    <div class="bismillah">&#1576;&#1587;&#1605; &#1575;&#1604;&#1604;&#1607; &#1575;&#1604;&#1585;&#1581;&#1605;&#1606; &#1575;&#1604;&#1585;&#1581;&#1610;&#1605;</div>
    <div class="ring">&#128141;</div>
    <h1>Sameh & Sara</h1>
    <p>Together Forever</p>
    <button class="open-btn" id="openBtn">Open Invitation</button>
  </div>
</section>
<section class="invitation" id="invitation">
  <div class="card">
    <h2>&#1583;&#1593;&#1608;&#1577; &#1586;&#1601;&#1575;&#1601;</h2>
    <h1>Sameh & Sara</h1>
    <p class="invite">&#1606;&#1578;&#1588;&#1585;&#1601; &#1576;&#1583;&#1593;&#1608;&#1578;&#1603;&#1605; &#1604;&#1581;&#1590;&#1608;&#1585; &#1581;&#1601;&#1604; &#1586;&#1601;&#1575;&#1601;&#1606;&#1575;</p>
    <div class="info">
      <p>&#128197; &#1575;&#1604;&#1587;&#1576;&#1578; 29 &#1571;&#1594;&#1587;&#1591;&#1587; 2026</p>
      <p>&#128347; &#1575;&#1604;&#1587;&#1575;&#1593;&#1577; 8:00 &#1605;&#1587;&#1575;&#1569;</p>
      <p>&#128205; &#1602;&#1575;&#1593;&#1577; &#1575;&#1604;&#1607;&#1590;&#1576;&#1577; - &#1583;&#1603;&#1585;&#1606;&#1587;<br>&#1576;&#1580;&#1608;&#1575;&#1585; &#1576;&#1606;&#1586;&#1610;&#1606;&#1577; &#1578;&#1608;&#1578;&#1575;&#1604;</p>
    </div>
    <a class="map-btn" href="#" onclick="return false;">&#1593;&#1585;&#1590; &#1575;&#1604;&#1605;&#1608;&#1602;&#1593; &#1593;&#1604;&#1609; Google Maps</a>
  </div>
  <p class="note">&#1608;&#1580;&#1608;&#1583;&#1603;&#1605; &#1610;&#1588;&#1585;&#1601;&#1606;&#1575; &#1608;&#1610;&#1587;&#1593;&#1583;&#1606;&#1575; &#10084;&#65039;<br>We can't wait to celebrate with you.</p>
  <button class="back-btn" id="backBtn">Back</button>
</section>
<script>
const openBtn=document.getElementById("openBtn");
const backBtn=document.getElementById("backBtn");
const hero=document.getElementById("hero");
const invitation=document.getElementById("invitation");
openBtn.addEventListener("click",function(){hero.style.display="none";invitation.classList.add("show");window.scrollTo(0,0);});
backBtn.addEventListener("click",function(){invitation.classList.remove("show");hero.style.display="flex";window.scrollTo(0,0);});
</script>
</body>
</html>
